name: Deploy to Cloud Run

on:
  push:
    tags:
      - 'v*'

env:
  PROJECT_ID: morrisdev-203721
  REGION: us-west1
  SERVICE: littleberry-v2
  IMAGE: gcr.io/morrisdev-203721/littleberry-v2

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t $IMAGE:${{ github.ref_name }} \
            -t $IMAGE:latest \
            .

      - name: Push Docker image
        run: |
          docker push $IMAGE:${{ github.ref_name }}
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image=$IMAGE:${{ github.ref_name }} \
            --region=$REGION \
            --project=$PROJECT_ID \
            --update-secrets=/run/secrets/appsettings.json=littleberry-appsettings:latest \
            --add-cloudsql-instances=morrisdev-203721:us-central1:morrisdev \
            --quiet
