<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Navy background with rounded corners -->
  <rect width="32" height="32" rx="6" fill="#1a4480"/>

  <!-- Open book — left pages -->
  <path d="M7 12 Q7 11 8 10.5 Q12 9.5 15.5 9.5 L15.5 23 Q11 23.5 8 24.5 Q7 25 7 24 Z"
        fill="#f0ebe0"/>

  <!-- Open book — right pages (slightly darker for depth) -->
  <path d="M25 12 Q25 11 24 10.5 Q20 9.5 16.5 9.5 L16.5 23 Q21 23.5 24 24.5 Q25 25 25 24 Z"
        fill="#d8d3c8"/>

  <!-- Book spine line -->
  <rect x="15.5" y="9.5" width="1" height="13.5" rx="0.5" fill="#c8a951"/>

  <!-- Berry cluster (3 berries in a triangle above the spine) -->
  <circle cx="16"   cy="5.5" r="2"   fill="#c8a951"/>
  <circle cx="13"   cy="7.2" r="1.5" fill="#c8a951" opacity="0.85"/>
  <circle cx="19"   cy="7.2" r="1.5" fill="#c8a951" opacity="0.85"/>

  <!-- Tiny stem connecting berries to book -->
  <line x1="16" y1="7.5" x2="16" y2="9.5" stroke="#c8a951" stroke-width="0.8"/>
</svg>
